name: Keep Streamlit Demo Alive

on:
  schedule:
    # Runs every 6 hours — keeps Streamlit from sleeping (free tier sleeps after 12h)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab + phone

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit demo
        run: |
          echo "Pinging AML Engine demo..."
          DEMO_URL="https://aml-detection-engine-ewxnmkbekcg8scjjes7caa.streamlit.app/"

          # First try: HTTP ping with redirect following
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 --max-redirs 10 "$DEMO_URL" || echo "000")
          echo "HTTP status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "App is awake (HTTP 200). Done."
            exit 0
          fi

          echo "App may be sleeping (status $STATUS). Trying browser wake..."

          # Install playwright for browser-based wake
          python3 -m pip install playwright
          python3 -m playwright install chromium --with-deps

          # Run wake script
          python3 << 'PYEOF'
import sys

DEMO_URL = "https://aml-detection-engine-ewxnmkbekcg8scjjes7caa.streamlit.app/"

try:
    from playwright.sync_api import sync_playwright

    with sync_playwright() as p:
        browser = p.chromium.launch(headless=True)
        page = browser.new_page()

        print(f"Navigating to {DEMO_URL}")
        page.goto(DEMO_URL, timeout=60000, wait_until="domcontentloaded")

        try:
            wake_btn = page.locator("text=Yes, get this app back up")
            if wake_btn.count() > 0:
                print("App was sleeping — clicking wake button...")
                wake_btn.first.click()
                page.wait_for_timeout(15000)
                print("Wake button clicked. Waiting for boot...")
            else:
                print("App is already awake (no wake button found).")
        except Exception as e:
            print(f"Wake button check: {e}")

        page.wait_for_timeout(5000)
        print(f"Page title: {page.title()}")
        print("Ping complete.")
        browser.close()

except Exception as e:
    print(f"Error during ping: {e}")
    sys.exit(1)
PYEOF

      - name: Log result
        run: echo "Keep-alive ping completed at $(date -u)"
