name: AML Monitoring

on:
  schedule:
    - cron: '0 14 * * *'  # Daily 2PM UTC (10AM EST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AML monitor
        run: python scripts/monitor.py
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Commit alerts
        run: |
          git config user.name "AML Monitor"
          git config user.email "monitor@bionicbanker.tech"
          git add data/monitoring/ config/watchlist.json
          git diff --staged --quiet || git commit -m "AML alert: $(date +%Y-%m-%d)"
          git push
