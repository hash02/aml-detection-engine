name: weekly-backtest

# Every Monday 06:00 UTC. Manual trigger also available.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    env:
      FEEDS_OFFLINE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        id: bt
        run: |
          python scripts/backtest.py --dir data --out backtest_report.json
          # Extract aggregate rate
          rate=$(python -c "import json; print(json.load(open('backtest_report.json'))['aggregate_rate'])")
          echo "rate=$rate" >> "$GITHUB_OUTPUT"
          # Flag a regression if aggregate rate < 60% (portfolio baseline is ~67%)
          python -c "import json,sys; r=json.load(open('backtest_report.json'));
          sys.exit(1 if r['aggregate_rate'] < 60 else 0)" || echo "regressed=true" >> "$GITHUB_OUTPUT"

      - name: Run benchmark
        run: |
          python scripts/benchmark.py --sizes 100 500 --repeats 2 --out bench_report.json
          cat bench_report.json

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reports-${{ github.run_id }}
          path: |
            backtest_report.json
            bench_report.json
          retention-days: 30

      - name: Open regression issue
        if: steps.bt.outputs.regressed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r  = JSON.parse(fs.readFileSync('backtest_report.json', 'utf8'));
            const title = `Weekly backtest regression: aggregate rate ${r.aggregate_rate}%`;
            const body  = [
              "The scheduled weekly backtest produced an aggregate detection",
              "rate below the 60% regression threshold.",
              "",
              "```json",
              JSON.stringify(r, null, 2).slice(0, 3500),
              "```",
              "",
              "Run artifacts: see the workflow run for full reports.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title, body,
              labels: ["regression", "weekly-backtest"],
            });
